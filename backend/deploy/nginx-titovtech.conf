server {
    server_name titovtech.ru www.titovtech.ru;

    # Landing page
    root /opt/titovtech/static-landing/assistent;
    index index.html;

    # Disable all caching for REG.RU proxy
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header X-Accel-Expires "0";

    # Root redirect to /assistent/
    location = / {
        return 301 /assistent/;
    }

    # API - proxy to Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin under /assistent/admin/
    location /assistent/admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files for Django admin
    location /assistent/static/ {
        alias /opt/titovtech/staticfiles/;
        expires -1;
    }

    # Landing page - serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/titovtech.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/titovtech.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.titovtech.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = titovtech.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name titovtech.ru www.titovtech.ru;
    return 404; # managed by Certbot
}
